apiVersion: v1
kind: ConfigMap
metadata:
  name: orthanc-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cima-x.labels" . | nindent 4 }}
data:
  orthanc.json: |
    {
      "StorageDirectory": "/data",
      "DicomAet": {{ .Values.orthanc.aet | quote }},
      "DicomPort": {{ .Values.orthanc.dicomPort }},
      "HttpPort": {{ .Values.orthanc.httpPort }},
      "RemoteAccessAllowed": true,
      "AuthenticationEnabled": true,
      "DicomCheckCallingAet": {{ .Values.orthanc.checkCallingAet }},
      "DicomModalities": {
        {{- range $name, $m := .Values.orthanc.modalities }}
        {{ $name | quote }}: {
          "AET": {{ $m.aet | quote }},
          "Host": {{ $m.host | quote }},
          "Port": {{ $m.port }}
        },
        {{- end }}
      },
      "Plugins": {{ .Values.orthanc.plugins | toJson }},
      "IngestTranscoding": {{ .Values.orthanc.ingestTranscoding | quote }}
    }
