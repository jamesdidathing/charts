apiVersion: v1
kind: Pod
metadata:
  name: associate
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "cima-x.labels" . | nindent 4 }}
spec:
  containers:
  - name: xnat-ingest-associate
    image: {{ .Values.xnatIngest.image }}
    imagePullPolicy: {{ .Values.xnatIngest.imagePullPolicy }}
    env:
    - name: XINGEST_DATATYPES
      value: {{ .Values.xnatIngest.associate.datatypes | quote }}
      # Siemens raw data types: Twix k-space, MRS spectroscopy RDA, physiological PULS recordings
    - name: XINGEST_COPY_MODE
      value: {{ .Values.xnatIngest.associate.copyMode | quote }}
    - name: XINGEST_LOGGERS
      value: {{ .Values.xnatIngest.associate.loggers | quote }}
    {{- include "cima-x.xnatIngestCommonEnv" . | nindent 4 }}
    {{- include "cima-x.dicomTagEnv" . | nindent 4 }}
    envFrom:
    - configMapRef:
        name: proxy-config  # injects any proxy settings (currently empty)
    command:
    - bash
    - -c
    - |
      set -x
      sleep infinity  # pod stays running so kubectl exec can be used to run associate manually
      # To associate manually (example for RDA files):
      # kubectl exec -it associate -n {{ .Values.namespace }} -- \
      #   xnat-ingest associate-cli /data/cima-export /data/staging/sorted \
      #   --associated-files 'medimage/vnd.siemens.syngo-mr.xa.rda' \
      #     '{PatientName}/**/*.rda' \
      #     '.*\.(?P<id>\d+)\.\d+\.\d+\.(?P<resource>[^.]+)'
    volumeMounts:
    - name: storage
      mountPath: /data
  {{- include "cima-x.xnatIngestVolumes" . | nindent 2 }}
