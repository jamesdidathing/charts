# Pass to setup.sh: bash helm/setup.sh helm/my-values.yaml
# Or directly:      helm install cima-x helm/cima-x -f helm/my-values.yaml

# ── Required ──────────────────────────────────────────────────────────────────

# Kubernetes namespace to deploy into
namespace: ais-edge

# Directory on the VM host that will hold all pipeline data
storage:
  hostPath: /data/ais-edge
  capacity: 1500Gi

# ── Orthanc ───────────────────────────────────────────────────────────────────

orthanc:
  # AET must match what scanners are configured to send to
  aet: ORTHANC

  # External ports on the VM
  nodePorts:
    dicom: 30042   # scanner sends DICOM here
    http:  30842   # Orthanc web UI and REST API

# ── Samba ─────────────────────────────────────────────────────────────────────

samba:
  # SMB share name, connect via \\<vm-ip>\<shareName>
  shareName: cima-x

# ── DICOM tag mapping ─────────────────────────────────────────────────────────
# Maps DICOM tags to XNAT fields. Change only if your scanners use different tags.

xnatIngest:
  dicomTagMapping:
    project: StudyDescription
    subject: PatientName
    visit: PatientID
    session: StudyInstanceUID

# ── Storage class ─────────────────────────────────────────────────────────────
# Set create: false if "hostpath-pipeline" already exists on the cluster

storageClass:
  create: true
