---
apiVersion: v1
kind: ConfigMap
metadata:
  name: orthanc-config
  namespace: ais-edge
data:
  orthanc.json: |
    {
      "StorageDirectory": "/data",
      "DicomAet": "ORTHANC",
      "DicomPort": 4242,
      "HttpPort": 8042,
      "RemoteAccessAllowed": true,
      "AuthenticationEnabled": true,
      "Plugins": [
        "/usr/local/share/orthanc/plugins/libStoneWebViewer.so",
        "/usr/local/share/orthanc/plugins/libOrthancDicomWeb.so",
        "/usr/local/share/orthanc/plugins/libOrthancGdcm.so"
      ],
      "IngestTranscoding": "1.2.840.10008.1.2.1"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orthanc
  namespace: ais-edge
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: orthanc
  template:
    metadata:
      labels:
        app: orthanc
    spec:
      containers:
      - name: orthanc
        image: jodogne/orthanc-plugins
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4242
          name: dicom
          protocol: TCP
        - containerPort: 8042
          name: http
          protocol: TCP
        volumeMounts:
        - name: data
          mountPath: /data
          subPath: orthanc-storage
        - name: config
          mountPath: /etc/orthanc/orthanc.json
          subPath: orthanc.json
        - name: credentials
          mountPath: /etc/orthanc/users.json
          subPath: users.json
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: ais-edge
      - name: config
        configMap:
          name: orthanc-config
      - name: credentials
        secret:
          secretName: orthanc-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: orthanc
  namespace: ais-edge
spec:
  type: NodePort
  selector:
    app: orthanc
  ports:
  - name: dicom
    port: 4242
    targetPort: 4242
    nodePort: 30042
    protocol: TCP
  - name: http
    port: 8042
    targetPort: 8042
    nodePort: 30842
    protocol: TCP
